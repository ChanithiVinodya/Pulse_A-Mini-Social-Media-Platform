<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messages — Pulse</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>💬</text></svg>"
    />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <div class="sidebar-logo">Pulse</div>
        <nav class="sidebar-nav">
          <a href="feed.html">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            </svg>
            Home
          </a>
          <button class="sidebar-nav-btn" id="sidebar-search-btn">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
            Search
          </button>
          <a href="messages.html" class="active">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-13.5 8.38 8.38 0 0 1 3.8.9L21 3z"
              />
            </svg>
            Messages
          </a>
          <a href="profile.html">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            Profile
          </a>
        </nav>
        <button class="sidebar-create" id="sidebar-create-btn">
          Create Post
        </button>
        <button class="sidebar-logout-btn" id="sidebar-logout-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <path d="M16 17l5-5-5-5" />
            <path d="M21 12H9" />
          </svg>
          Log Out
        </button>
      </aside>

      <main class="main-content">
        <nav class="top-nav">
          <div class="top-nav-left">
            <h1>Messages</h1>
          </div>
          <div class="top-nav-right">
            <button
              class="btn btn-outline"
              id="logout-btn"
              style="padding: 6px 12px; font-size: 0.75rem"
            >
              Log out
            </button>
          </div>
        </nav>
        <div class="messages-layout">
          <div class="conversations-panel" id="conversations-panel">
            <div class="panel-header">
              <h1>Messages</h1>
              <button class="new-chat-btn" id="new-chat-btn">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
                  />
                  <path
                    d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
                  />
                </svg>
              </button>
            </div>
            <div class="conversations-list" id="conversations-list">
              <div class="loader">Loading...</div>
            </div>
          </div>

          <div class="chat-panel" id="chat-panel">
            <div class="chat-empty" id="chat-empty">
              <div class="chat-empty-icon">💬</div>
              <h2>Your Messages</h2>
              <p>Send private photos and messages to a friend.</p>
              <button class="btn btn-primary" id="start-chat-btn">
                Send Message
              </button>
            </div>

            <div class="chat-view hidden" id="chat-view">
              <div class="chat-header">
                <button class="back-btn" id="chat-back-btn">
                  <svg
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path d="m15 18-6-6 6-6" />
                  </svg>
                </button>
                <div class="chat-user-info">
                  <div class="avatar avatar-sm" id="chat-user-avatar"></div>
                  <span class="chat-username" id="chat-username">Username</span>
                </div>
              </div>
              <div class="chat-messages" id="chat-messages"></div>
              <form class="chat-input-area" id="chat-form">
                <input
                  type="text"
                  id="chat-input"
                  placeholder="Write a message..."
                  required
                  autocomplete="off"
                />
                <button type="submit" class="send-btn">
                  <svg
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path d="m22 2-7 20-4-9-9-4Z" />
                    <path d="M22 2 11 13" />
                  </svg>
                </button>
              </form>
            </div>
          </div>
        </div>
      </main>

      <nav class="bottom-nav">
        <a href="feed.html">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          </svg>
          Home
        </a>
        <button class="bottom-nav-item" id="bottom-search-btn">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          Search
        </button>
        <a href="messages.html" class="active">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-13.5 8.38 8.38 0 0 1 3.8.9L21 3z"
            />
          </svg>
          Messages
        </a>
        <a href="profile.html">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          Profile
        </a>
        <button class="bottom-nav-item bottom-nav-logout" id="bottom-logout-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <path d="M16 17l5-5-5-5" />
            <path d="M21 12H9" />
          </svg>
          Log Out
        </button>
      </nav>
    </div>

    <div class="modal" id="search-modal">
      <div class="modal-content search-modal-content">
        <div class="modal-header">
          <div class="search-input-wrapper">
            <svg
              class="search-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
            <input
              type="text"
              id="user-search-input"
              placeholder="Search users..."
              autofocus
            />
          </div>
          <button class="modal-close" id="close-search-modal">&times;</button>
        </div>
        <div class="search-results" id="search-results">
          <div class="search-empty">Type to search for people</div>
        </div>
      </div>
    </div>

    <script type="module" src="../js/messages.js"></script>
  </body>
</html>
