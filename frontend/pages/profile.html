<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Pulse</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>💚</text></svg>" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">Pulse</div>
      <nav class="sidebar-nav">
        <a href="feed.html">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          </svg>
          Home
        </a>
        <button class="sidebar-nav-btn" id="sidebar-search-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          Search
        </button>
        <a href="messages.html">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-13.5 8.38 8.38 0 0 1 3.8.9L21 3z" />
          </svg>
          Messages
        </a>
        <a href="profile.html" class="active">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          Profile
        </a>
      </nav>
      <button class="sidebar-logout-btn" id="sidebar-logout-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <path d="M16 17l5-5-5-5" />
          <path d="M21 12H9" />
        </svg>
        Log Out
      </button>
    </aside>

    <main class="main-content">
      <nav class="top-nav">
        <div class="top-nav-left">
          <a href="feed.html" style="font-size: 0.875rem; color: var(--muted)">← Back</a>
        </div>
        <div class="top-nav-right">
          <button id="logout-btn" class="btn btn-outline" style="padding: 6px 12px; font-size: 0.75rem">
            Log out
          </button>
        </div>
      </nav>

      <div class="feed-container" id="profile-content">
        <div class="loader">Loading profile...</div>
      </div>
    </main>

    <aside class="right-panel">
      <div class="suggestions-card">
        <h3>About Pulse</h3>
        <p style="font-size: 0.875rem; color: var(--muted)">
          Share photos, stories, and connect with people you follow.
        </p>
      </div>
    </aside>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
      </svg>
      Home
    </a>
    <button class="bottom-nav-item" id="bottom-search-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg>
      Search
    </button>
    <a href="feed.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2" />
        <path d="M12 8v8M8 12h8" />
      </svg>
      Create
    </a>
    <a href="messages.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-13.5 8.38 8.38 0 0 1 3.8.9L21 3z" />
      </svg>
      Messages
    </a>
    <a href="profile.html" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
        <circle cx="12" cy="7" r="4" />
      </svg>
      Profile
    </a>
    <button class="bottom-nav-item bottom-nav-logout" id="bottom-logout-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <path d="M16 17l5-5-5-5" />
        <path d="M21 12H9" />
      </svg>
      Log Out
    </button>
  </nav>

    <div class="modal" id="follow-modal">
      <div class="modal-content follow-modal-content">
        <div class="modal-header">
          <h2 id="follow-modal-title">Followers</h2>
          <button class="modal-close" id="close-follow-modal">&times;</button>
        </div>
        <div class="follow-list" id="follow-modal-list"></div>
      </div>
    </div>

    <div class="modal" id="search-modal">
    <div class="modal-content search-modal-content">
      <div class="modal-header">
        <div class="search-input-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input type="text" id="user-search-input" placeholder="Search users..." autofocus />
        </div>
        <button class="modal-close" id="close-search-modal">&times;</button>
      </div>
      <div class="search-results" id="search-results">
        <div class="search-empty">Type to search for people</div>
      </div>
    </div>
  </div>

  <script type="module" src="../js/profile.js"></script>
</body>

</html>
