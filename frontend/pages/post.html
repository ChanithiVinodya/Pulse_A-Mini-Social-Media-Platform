<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post — Pulse</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>💚</text></svg>"
    />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <div class="sidebar-logo">Pulse</div>
        <nav class="sidebar-nav">
          <a href="feed.html">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            </svg>
            Home
          </a>
          <a href="profile.html">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            Profile
          </a>
        </nav>
      </aside>

      <main class="main-content">
        <nav class="top-nav">
          <div class="top-nav-left">
            <a href="feed.html" style="font-size: 0.875rem; color: var(--muted)"
              >← Back to feed</a
            >
          </div>
          <div class="top-nav-right">
            <button
              class="btn btn-outline"
              id="logout-btn"
              style="padding: 6px 12px; font-size: 0.75rem"
            >
              Log out
            </button>
          </div>
        </nav>

        <div class="feed-container">
          <div id="post-detail"></div>
          <section class="comments-section">
            <h2>Comments</h2>
            <div id="comments-list"></div>
          </section>
        </div>
      </main>

      <aside class="right-panel"></aside>
    </div>

    <form class="comment-form" id="comment-form">
      <input
        type="text"
        placeholder="Add a comment..."
        required
        maxlength="1000"
      />
      <button type="submit">Post</button>
    </form>

    <nav class="bottom-nav">
      <a href="feed.html">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
        </svg>
        Home
      </a>
      <a href="#">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>
        Search
      </a>
      <a href="feed.html">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <path d="M12 8v8M8 12h8" />
        </svg>
        Create
      </a>
      <a href="profile.html">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        Profile
      </a>
    </nav>

    <script type="module" src="../js/post.js"></script>
  </body>
</html>
