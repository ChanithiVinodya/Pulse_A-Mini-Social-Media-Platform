<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feed — Pulse</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>💚</text></svg>" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">Pulse</div>
      <nav class="sidebar-nav">
        <a href="feed.html" class="active">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          </svg>
          Home
        </a>
        <button class="sidebar-nav-btn" id="sidebar-search-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          Search
        </button>
        <a href="profile.html">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          Profile
        </a>
      </nav>
      <button class="sidebar-create" id="sidebar-create-btn">
        Create Post
      </button>
    </aside>

    <main class="main-content">
      <nav class="top-nav">
        <div class="top-nav-left">
          <div class="avatar avatar-sm" id="nav-avatar"></div>
          <div class="nav-user-info">
            <span class="nav-greeting">Hey</span>
            <span class="nav-user-name" id="greeting-username">Rita Gomaz</span>
          </div>
        </div>
        <div class="top-nav-right">
          <button class="nav-icon-btn" id="nav-search-btn">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
          </button>
          <button class="nav-icon-btn">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            <span class="nav-badge"></span>
          </button>
        </div>
      </nav>

      <div class="feed-container">
        <section class="stories-section">
          <div class="stories-scroll" id="stories-container"></div>
          <input type="file" id="story-input" accept="image/*" hidden />
        </section>

        <div id="feed-posts"></div>
        <div id="feed-loader" class="loader">Loading...</div>
        <div id="feed-sentinel" style="height: 1px"></div>
      </div>
    </main>

    <aside class="right-panel">
      <div class="suggestions-card">
        <h3>Suggested for you</h3>
        <div class="suggestion-item">
          <div class="avatar avatar-sm">
            <span class="avatar-placeholder">P</span>
          </div>
          <span>pulse_official</span>
          <button class="btn btn-primary" style="padding: 6px 12px; font-size: 0.75rem">
            Follow
          </button>
        </div>
        <div class="suggestion-item">
          <div class="avatar avatar-sm">
            <span class="avatar-placeholder">D</span>
          </div>
          <span>discover_daily</span>
          <button class="btn btn-primary" style="padding: 6px 12px; font-size: 0.75rem">
            Follow
          </button>
        </div>
      </div>
      <div class="suggestions-card">
        <h3>Trending</h3>
        <p style="font-size: 0.875rem; color: var(--muted)">
          #photography · #travel · #food
        </p>
      </div>
    </aside>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
      </svg>
      Home
    </a>
    <button class="bottom-nav-item" id="bottom-search-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg>
      Search
    </button>
    <a href="#" id="create-post-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2" />
        <path d="M12 8v8M8 12h8" />
      </svg>
      Create
    </a>
    <a href="profile.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
        <circle cx="12" cy="7" r="4" />
      </svg>
      Profile
    </a>
  </nav>

  <button class="fab" id="fab-create-post" aria-label="Create post">+</button>

  <div class="modal" id="create-post-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Create Post</h2>
        <button class="modal-close" id="close-post-modal">&times;</button>
      </div>
      <form id="create-post-form" enctype="multipart/form-data">
        <div class="form-group">
          <label for="post-content">Caption</label>
          <textarea id="post-content" name="content" rows="4" required placeholder="What's on your mind?"></textarea>
        </div>
        <div class="form-group">
          <label for="post-image">Image (optional)</label>
          <input type="file" id="post-image" name="image" accept="image/*" />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Post</button>
      </form>
    </div>
  </div>

  <div class="modal" id="search-modal">
    <div class="modal-content search-modal-content">
      <div class="modal-header">
        <div class="search-input-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input type="text" id="user-search-input" placeholder="Search users..." autofocus />
        </div>
        <button class="modal-close" id="close-search-modal">&times;</button>
      </div>
      <div class="search-results" id="search-results">
        <div class="search-empty">Type to search for people</div>
      </div>
    </div>
  </div>

  <div class="modal" id="comment-modal">
    <div class="modal-content comment-modal-content">
      <div class="modal-header">
        <h2>Comments</h2>
        <button class="modal-close" id="close-comment-modal">&times;</button>
      </div>
      <div class="modal-body">
        <div id="modal-comments-list" class="comments-list"></div>
      </div>
      <div class="modal-footer">
        <form id="modal-comment-form" class="comment-form">
          <input type="text" placeholder="Add a comment..." required maxlength="1000" />
          <button type="submit">Post</button>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="../js/feed.js"></script>
  <script type="module">
    document
      .getElementById("fab-create-post")
      ?.addEventListener("click", () => {
        document.getElementById("create-post-modal")?.classList.add("open");
      });
    document
      .getElementById("sidebar-create-btn")
      ?.addEventListener("click", () => {
        document.getElementById("create-post-modal")?.classList.add("open");
      });
  </script>
</body>

</html>
