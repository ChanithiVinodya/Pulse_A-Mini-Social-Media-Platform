<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse — Share your moments</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>💚</text></svg>">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="landing">
    <header class="landing-header">
      <span class="logo">Pulse</span>
      <a href="pages/login.html" class="btn btn-outline">Sign in</a>
    </header>

    <div class="hero">
      <div class="hero-visual">
        <div class="floating-avatars">
          <div class="floating-avatar">
            <img src="https://i.pravatar.cc/150?u=a1" alt="User">
          </div>
          <div class="floating-avatar">
            <img src="https://i.pravatar.cc/150?u=a2" alt="User">
          </div>
          <div class="floating-avatar">
            <img src="https://i.pravatar.cc/150?u=a3" alt="User">
          </div>
          <div class="floating-avatar">
            <img src="https://i.pravatar.cc/150?u=a4" alt="User">
          </div>
          <div class="floating-avatar">
            <img src="https://i.pravatar.cc/150?u=a5" alt="User">
          </div>
        </div>
      </div>

      <h1>Makes Friend<br>around the Word</h1>
      <p>Make friends around the world and discover new cultures, ideas, and smiles—no matter the distance.</p>

      <div class="hero-actions">
        <a href="pages/register.html" class="get-started-btn">
          <span>Get Start</span>
          <div class="icon-bg">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
              <path d="M13 17l5-5-5-5M6 17l5-5-5-5" />
            </svg>
          </div>
        </a>
        <div class="auth-footer">
          Already have an account? <a href="pages/login.html">Sign in</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
